<!DOCTYPE html>
<html lang="id" data-page="infografis">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infografis Kreatif | Portofolio</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader"><div class="spinner"></div></div>
    <div id="navbar-placeholder"></div>

    <main class="container fade-in-section page-padding">

        <h2 class="page-title" style="text-align:center;">
            Galeri Infografis
        </h2>

        <div style="
            display:flex;
            justify-content:center;
            align-items:center;
            width:100%;
        ">

            <div class="card glass" style="
                width:800px;
                max-width:90%;
                padding:30px;
                text-align:center;
            ">

                <img
                    src="https://drive.google.com/thumbnail?id=1wDqNS5R9DvHcywBCSn_B2oS3XC411Q8T&sz=w2000"
                    alt="Infografis Computational Thinking"
                    style="
                        width:100%;
                        height:auto;
                        display:block;
                        margin:0 auto;
                        border-radius:16px;
                    "
                >

                <div style="margin-top:20px;">
                    <h3>Infografis Computational Thinking</h3>

                    <p style="
                        max-width:650px;
                        margin:12px auto 0;
                        line-height:1.8;
                    ">
                        Visualisasi pembelajaran Computational Thinking yang
                        menggambarkan konsep dekomposisi, pengenalan pola,
                        abstraksi, dan perancangan algoritma sebagai dasar
                        pemecahan masalah secara sistematis.
                    </p>
                </div>

            </div>

        </div>

    </main>

    <div id="lightbox" class="lightbox">
        <span class="lightbox-close">&times;</span>
        <img class="lightbox-content" id="lightbox-img" alt="Enlarged view">
        <div id="lightbox-caption"></div>
    </div>

    <div id="footer-placeholder"></div>
    <button id="back-to-top">&#8593;</button>
    <script src="script.js"></script>
</body>
</html>
