<!DOCTYPE html>
<html lang="id" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar</title>
    <style>
        :root {
            --primary-color: #2563eb;
            --primary-hover: #1d4ed8;
            --bg-color: #f8fafc;
            --text-color: #0f172a;
            --text-muted: #64748b;
            --card-bg: rgba(255, 255, 255, 0.7);
            --card-border: rgba(255, 255, 255, 0.4);
            --nav-bg: rgba(255, 255, 255, 0.95);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.06);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        [data-theme="dark"] {
            --bg-color: #0f172a;
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.08);
            --nav-bg: rgba(15, 23, 42, 0.95);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { font-family: 'Poppins', 'Inter', sans-serif; }
        body { background-color: var(--bg-color); color: var(--text-color); transition: var(--transition); min-height: 100vh; }

        /* NAVBAR */
        .navbar {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
            background: var(--nav-bg);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--card-border);
            transition: var(--transition);
        }
        .nav-container {
            max-width: 1200px; margin: 0 auto; padding: 16px 20px;
            display: flex; justify-content: space-between; align-items: center;
        }
        .nav-logo {
            font-size: 1.5rem; font-weight: 700;
            text-decoration: none; color: var(--text-color);
        }
        .nav-menu {
            display: flex; list-style: none; gap: 30px;
        }
        .nav-link {
            text-decoration: none; color: var(--text-color);
            font-weight: 500; position: relative;
            padding: 5px 0; transition: var(--transition);
        }
        .nav-link::after {
            content: ''; position: absolute; bottom: 0; left: 0;
            width: 0; height: 2px;
            background-color: var(--primary-color); transition: var(--transition);
        }
        .nav-link:hover::after, .nav-link.active::after { width: 100%; }
        .nav-link.active { color: var(--primary-color); }

        .nav-actions { display: flex; align-items: center; gap: 16px; }
        #theme-toggle {
            background: none; border: none; cursor: pointer;
            color: var(--text-color); width: 24px; height: 24px;
        }
        #theme-toggle .moon-icon { display: none; }
        [data-theme="dark"] #theme-toggle .sun-icon { display: none; }
        [data-theme="dark"] #theme-toggle .moon-icon { display: block; }

        /* HAMBURGER — hidden by default on desktop */
        .hamburger {
            display: none;
            cursor: pointer;
            background: none;
            border: none;
            padding: 4px;
        }
        .bar {
            display: block;
            width: 25px; height: 3px;
            margin: 5px auto;
            background-color: var(--text-color);
            border-radius: 3px;
            transition: var(--transition);
        }

        /* MOBILE */
        @media (max-width: 768px) {
            .hamburger {
                display: block; /* tampilkan di mobile */
            }

            .nav-menu {
                display: flex;
                flex-direction: column;
                position: fixed;
                top: 57px; /* tinggi navbar */
                left: -100%;
                width: 100%;
                text-align: center;
                padding: 30px 0;
                gap: 0;
                background: var(--nav-bg);
                backdrop-filter: blur(15px);
                -webkit-backdrop-filter: blur(15px);
                box-shadow: var(--shadow);
                transition: left 0.3s ease;
                z-index: 999;
            }
            .nav-menu li { padding: 10px 0; }
            .nav-menu.active { left: 0; }

            .hamburger.active .bar:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .hamburger.active .bar:nth-child(2) { opacity: 0; }
            .hamburger.active .bar:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        }

        /* Page content just for demo */
        .demo-content {
            padding-top: 100px;
            padding: 100px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
            text-align: center;
        }
        .demo-content h1 { font-size: 2rem; margin-bottom: 12px; }
        .demo-content p { color: var(--text-muted); line-height: 1.6; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-container">
        <a href="index.html" class="nav-logo">Portofolio</a>

        <ul class="nav-menu" id="navMenu">
            <li><a href="index.html" class="nav-link" data-page="index">Beranda</a></li>
            <li><a href="profil.html" class="nav-link" data-page="profil">Profil</a></li>
            <li><a href="dokumen.html" class="nav-link" data-page="dokumen">Dokumen</a></li>
            <li><a href="infografis.html" class="nav-link" data-page="infografis">Infografis</a></li>
            <li><a href="artefak.html" class="nav-link" data-page="artefak">Artefak</a></li>
            <li><a href="refleksi.html" class="nav-link" data-page="refleksi">Refleksi</a></li>
        </ul>

        <div class="nav-actions">
            <button id="theme-toggle" aria-label="Toggle Dark Mode">
                <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="5"></circle>
                    <line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                    <line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                </svg>
                <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                </svg>
            </button>

            <button class="hamburger" id="hamburger" aria-label="Toggle Menu">
                <span class="bar"></span>
                <span class="bar"></span>
                <span class="bar"></span>
            </button>
        </div>
    </div>
</nav>


<script>
    // Theme toggle
    const themeToggle = document.getElementById('theme-toggle');
    const savedTheme = localStorage.getItem('theme') || 'light';
    document.documentElement.setAttribute('data-theme', savedTheme);

    themeToggle.addEventListener('click', () => {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });

    // Hamburger toggle
    const hamburger = document.getElementById('hamburger');
    const navMenu = document.getElementById('navMenu');

    hamburger.addEventListener('click', () => {
        hamburger.classList.toggle('active');
        navMenu.classList.toggle('active');
    });

    // Tutup menu saat link diklik
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', () => {
            hamburger.classList.remove('active');
            navMenu.classList.remove('active');
        });
    });
</script>

</body>
</html>
